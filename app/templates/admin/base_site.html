{% extends "admin/base.html" %}
{% load static %}

{% block branding %}
<div style="display:flex; align-items:center; gap:10px;">

    <!-- MINI LOGO CON BORDE REDONDEADO -->
    <div style="
        width:28px;
        height:28px;
        border-radius:6px;
        overflow:hidden;
        display:flex;
        align-items:center;
        justify-content:center;
        background:#005DA4;  /* azul institucional */
    ">
        <img src="{% static 'img/logo.png' %}"
             alt="FCE UNRC"
             style="width:100%; height:100%; object-fit:cover;">
    </div>

    <h1 id="site-name">
        <a href="{% url 'admin:index' %}">
            Facultad de Ciencias Económicas – UNRC
        </a>
    </h1>
</div>
{% endblock %}

{% block extrastyle %}
    {{ block.super }}
    <link rel="stylesheet" href="{% static 'css/fce_admin.css' %}">
{% endblock %}
