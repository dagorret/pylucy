{% extends "admin_soft/base.html" %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row mb-4">
    <div class="col-12">
      <h2 class="mb-1">Panel de Lucy</h2>
      <p class="text-muted">
        Bienvenido, {{ request.user.get_full_name|default:request.user.username }}.
      </p>
    </div>
  </div>

  <div class="row">
    <!-- Tarjetas simples -->
    <div class="col-md-3 mb-4">
      <div class="card">
        <div class="card-body">
          <h6 class="text-muted text-uppercase mb-2">Usuarios</h6>
          <h3 class="mb-0">{{ site_header|default:"Admin" }}</h3>
        </div>
      </div>
    </div>

    <!-- Acá podés ir metiendo tus cosas de Lucy -->
    <div class="col-md-9 mb-4">
      <div class="card">
        <div class="card-body">
          <h5 class="mb-3">Accesos rápidos</h5>
          <a href="{% url 'admin:index' %}" class="btn btn-sm btn-primary me-2">
            Ir al admin clásico
          </a>
          <!-- Agregá aquí botones / links útiles -->
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
